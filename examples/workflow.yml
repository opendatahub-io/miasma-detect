# Example workflow: gate every PR / issue / comment on the Miasma scanner.
# Copy to .github/workflows/miasma-detect.yml in your repo.
#
# If you publish the action repo as <you>/miasma-detect, reference it as
# `uses: <you>/miasma-detect@v1`. Until then you can vendor it and use a
# local path (shown below for pull_request).

name: miasma-detect

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]
  push:
    branches: [main]   # direct-push safety net; PR branches are covered by
                       # pull_request:synchronize (a push-event run on a PR
                       # branch would add an unwaivable second check)

permissions:
  contents: read
  pull-requests: write   # report comments on PRs
  issues: write          # report comments on plain issues
  actions: write         # lets /miasma-approve re-run the failed PR check

jobs:
  scan:
    # GitHub-hosted runners are only available as Ubuntu/Windows/macOS VMs,
    # so the job runs inside a Red Hat UBI 9 container on that VM to get a
    # RHEL userland. For a fully Red Hat stack, use a self-hosted runner on
    # RHEL instead (runs-on: [self-hosted, rhel]) and drop `container:`.
    runs-on: ubuntu-latest
    container:
      image: registry.access.redhat.com/ubi9/nodejs-22:latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        with:
          fetch-depth: 0

      - name: Miasma detect
        uses: ann-marie/miasma-detect@v1   # or `uses: ./` if vendored in-repo
        with:
          min-severity: medium
          scan-changed-files: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}
