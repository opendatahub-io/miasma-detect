# Example GitLab CI/CD integration for miasma-detect.
# Include this job in your .gitlab-ci.yml (or `include:` this file).
#
# It runs first, scans MR text surfaces (title, description, branch name,
# commit message) plus changed files, and fails on detection — so every
# later stage (build, test, and especially any agentic job) never runs on
# malicious input. Make later jobs depend on it via stages or `needs:`.
#
# GIT_DEPTH: "0" gives the full history needed to diff MR changes.

stages:
  - gate
  - build   # your other stages come after the gate

miasma-detect:
  stage: gate
  image: registry.access.redhat.com/ubi9/nodejs-22:latest
  variables:
    GIT_DEPTH: "0"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
  script:
    - npm install -g miasma-detect
    - miasma-detect-gitlab-ci
  # Optional configuration (set as CI/CD variables or here):
  #   MIASMA_MIN_SEVERITY: "medium"
  #   MIASMA_CATEGORIES: "campaign-ioc,package,supply-chain,prompt-injection"
  #   MIASMA_LARGE_DIFF_LINES: "1000"   # flag diffs the UI collapses (0 = off)
  #   MIASMA_EXCLUDE: |
  #     vendor/
  #     **/testdata/
  #   MIASMA_IOC_PACKS: "packs/new-wave.json"
  #
  # MR report comments: set MIASMA_COMMENT_TOKEN (masked CI/CD variable holding
  # a project access token, `api` scope, Reporter role or higher) and the job
  # posts/updates a single MR note explaining findings, the human intervention
  # needed, and how to unblock. Without it the report goes to the job log only.
  # Set MIASMA_MR_COMMENT: "false" to disable.

# Human sign-off gate (GitLab-native alternative to approval comments):
# a maintainer must click ▶ on this job before any later stage runs.
# - `when: manual` + `allow_failure: false` blocks the pipeline until played.
# - GitLab's own permission model controls who can play it (protect the
#   environment or use protected branches to restrict to maintainers).
# - A new push creates a new pipeline where the job is un-played again, so
#   sign-offs can never go stale — approval always applies to the exact SHA.
# The job echoes who approved for the audit trail.
human-signoff:
  stage: gate
  needs: [miasma-detect]      # only offered after the scan passes
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
  allow_failure: false
  image: registry.access.redhat.com/ubi9/ubi-minimal:latest
  script:
    - echo "Human sign-off by $GITLAB_USER_LOGIN ($GITLAB_USER_NAME) for $CI_COMMIT_SHA"
