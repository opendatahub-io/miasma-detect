name: 'Miasma Detect'
description: >-
  Scans GitHub PR/issue/comment event payloads and changed files for
  Shai-Hulud/Miasma-family supply-chain worm IOCs, generic family-technique
  heuristics, and prompt-injection payloads. Fails the check on detection so
  downstream automation (including coding agents) stops processing.
author: 'Ann Marie Fred'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  min-severity:
    description: 'Failure threshold: low | medium | high | critical'
    required: false
    default: 'medium'
  categories:
    description: 'Comma-separated rule categories to apply (default: all). Options: campaign-ioc,supply-chain,prompt-injection,package'
    required: false
    default: ''
  ioc-packs:
    description: 'Newline- or comma-separated paths to extra IOC pack JSON files (adds new campaigns without code changes)'
    required: false
    default: ''
  large-diff-lines:
    description: 'Flag changed files whose diff meets/exceeds this many lines (collapsed by the GitHub UI, hidden from human review). 0 disables.'
    required: false
    default: '1000'
  exclude:
    description: 'Newline-separated gitignore-style patterns to skip (a .miasmaignore file at the repo root is also honored for directory scans)'
    required: false
    default: ''
  scan-changed-files:
    description: 'Also scan files changed in the PR/push (requires actions/checkout with fetch-depth: 0)'
    required: false
    default: 'true'
  paths:
    description: 'Additional newline-separated paths to scan'
    required: false
    default: ''
  signoff-command:
    description: 'Comment command a maintainer (write/admin) posts on the PR to acknowledge reviewed findings and waive the block. Approval must postdate the latest commit. Empty string disables waivers.'
    required: false
    default: '/miasma-approve'
  signoff-max-severity:
    description: 'Highest finding severity a sign-off can waive. Critical findings (confirmed IOCs) can never be waived when this is at its default.'
    required: false
    default: 'high'
  pr-comment:
    description: 'Post/update a report comment on the PR or issue explaining findings, required human intervention, and how to unblock (needs pull-requests: write, which also covers issue comments)'
    required: false
    default: 'true'
  github-token:
    description: 'Token used to post the PR report comment'
    required: false
    default: ${{ github.token }}

outputs:
  verdict:
    description: '"clean" or "blocked"'
  findings:
    description: 'JSON array of findings'

runs:
  using: 'node24'
  main: 'src/action.js'
