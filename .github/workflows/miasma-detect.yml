# Self-scan: run miasma-detect on its own repo's PRs, issues, and comments.
#
# UNPINNED BY DESIGN (repo is changing fast), but self-subversion-resistant:
# the scanner code is checked out from MAIN into ./.miasma-scanner and run
# from there — a PR can modify src/action.js all it wants; the copy that
# judges the PR is always the latest merged one, never the PR's own.
# Revisit pinning to a SHA once the code stabilizes.
#
# Excludes below are the files that legitimately contain campaign indicator
# strings (rules, packs, tests, docs) and would self-match on every touch.
# Anything NOT listed — including new files added anywhere — is still
# content-scanned, and PRs touching the excluded files still need human
# review by nature of what they are. Keep this list in sync by running:
#   node src/cli.js . | grep 'source:' | sort -u

name: miasma-detect

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write   # report comments on PRs and issues
  issues: write          # report comments on plain issues
  actions: write         # /miasma-approve comment can re-run the failed PR check

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      # PR/push content to scan (merge ref for PRs).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        with:
          fetch-depth: 0

      # The scanner itself — ALWAYS from main, never from the PR.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          path: .miasma-scanner

      - name: Miasma detect (self-scan)
        uses: ./.miasma-scanner
        with:
          min-severity: medium
          large-diff-lines: '1000'
          scan-changed-files: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}
          # Direct posting still handles issues + same-repo PRs (they have a
          # write token). Fork PRs get a read-only token, so the action skips
          # the post and instead writes the report artifact below; the
          # companion workflow (miasma-comment.yml) posts it. Companion is
          # gated to fork PRs only, so no double comment.
          pr-comment: 'true'
          report-artifact-dir: miasma-report
          trusted-bots: |
            dependabot[bot]
            renovate[bot]
          exclude: |
            .miasma-scanner/
            .github/workflows/miasma-detect.yml
            README.md
            SECURITY.md
            action.yml
            package.json
            docs/HOW-IT-WORKS.md
            hooks/claude-code-hook.js
            hooks/settings.example.json
            src/campaigns/
            src/cli.js
            src/rules.js
            src/scanner.js
            test/test.js

      # Upload the report so the fork-safe companion (miasma-comment.yml) can
      # post it on fork PRs, where this run's token is read-only. Runs even
      # when the scan fails; only meaningful on PR events.
      - name: Upload report artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: miasma-report
          path: miasma-report/
          if-no-files-found: ignore
